<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator - Lifetime Edition</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #0f766e;
      --primary-dark: #115e59;
      --accent: #14b8a6;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f0f9ff 0%, #f0fdf4 100%);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      color: white;
      padding: 2rem;
      text-align: center;
      box-shadow: var(--shadow-lg);
      animation: slideDown 0.6s ease-out;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-30px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: -1px;
    }

    .subtitle {
      font-size: 1rem;
      opacity: 0.9;
      font-weight: 300;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 3rem;
    }

    .card {
      background: var(--surface);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: var(--shadow);
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .card:nth-child(2) {
      animation-delay: 0.1s;
    }

    .card h2 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .card h2 .icon {
      font-size: 1.8rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: var(--text);
      font-size: 0.9rem;
    }

    input, textarea {
      width: 100%;
      padding: 0.75rem;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .button-group {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }

    button {
      flex: 1;
      padding: 0.85rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(15, 118, 110, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(15, 118, 110, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: var(--border);
      color: var(--text);
    }

    .btn-secondary:hover {
      background: #cbd5e1;
    }

    .btn-success {
      background: var(--success);
      color: white;
      padding: 0.6rem 1rem;
      font-size: 0.85rem;
    }

    .btn-success:hover {
      background: #059669;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
      padding: 0.6rem 1rem;
      font-size: 0.85rem;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .qr-preview {
      text-align: center;
      padding: 1.5rem;
      background: var(--bg);
      border-radius: 8px;
      margin-top: 1.5rem;
    }

    .qr-preview img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .qr-list {
      display: grid;
      gap: 1rem;
    }

    .qr-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      background: var(--bg);
      border-radius: 8px;
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      animation: slideInLeft 0.4s ease-out;
    }

    @keyframes slideInLeft {
      from {
        transform: translateX(-20px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .qr-item:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow);
      transform: translateX(2px);
    }

    .qr-item img {
      width: 60px;
      height: 60px;
      border-radius: 6px;
      object-fit: contain;
      background: white;
      padding: 4px;
      border: 1px solid var(--border);
    }

    .qr-info {
      flex: 1;
      min-width: 0;
    }

    .qr-label {
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.25rem;
      word-break: break-word;
    }

    .qr-content {
      font-size: 0.85rem;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 0.25rem;
    }

    .qr-meta {
      font-size: 0.75rem;
      color: #94a3b8;
    }

    .qr-actions {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .qr-actions button {
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: 1rem;
      opacity: 0.3;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: white;
      padding: 1rem 1.5rem;
      border-radius: 8px;
      box-shadow: var(--shadow-lg);
      animation: slideInUp 0.3s ease-out;
      z-index: 1000;
    }

    @keyframes slideInUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .toast.success {
      border-left: 4px solid var(--success);
      color: var(--success);
    }

    .toast.error {
      border-left: 4px solid var(--danger);
      color: var(--danger);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--surface);
      padding: 1.5rem;
      border-radius: 8px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    .stat-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    @media (max-width: 768px) {
      .layout {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 1.75rem;
      }

      .container {
        padding: 1rem;
      }

      .card {
        padding: 1.5rem;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .qr-item {
        flex-direction: column;
        text-align: center;
      }

      .qr-info {
        width: 100%;
      }

      .qr-actions {
        width: 100%;
        justify-content: center;
      }

      .qr-actions button {
        flex: 1;
      }
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <header>
    <h1>🔗 QR Code Generator</h1>
    <p class="subtitle">Create lifetime QR codes that never expire</p>
  </header>

  <div class="container">
    <div class="stats">
      <div class="stat-card">
        <div class="stat-number" id="totalQR">0</div>
        <div class="stat-label">Total QR Codes</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="totalScans">0</div>
        <div class="stat-label">Total Scans</div>
      </div>
    </div>

    <div class="layout">
      <!-- Generator Card -->
      <div class="card">
        <h2><span class="icon">✨</span> Generate QR Code</h2>
        
        <form id="qrForm">
          <div class="form-group">
            <label for="content">Content (URL, Text, etc.)</label>
            <textarea id="content" placeholder="Enter URL, text, email, phone number, or any content..." required></textarea>
          </div>

          <div class="form-group">
            <label for="label">Label (Optional)</label>
            <input type="text" id="label" placeholder="e.g., My Website, Business Card, etc.">
          </div>

          <div class="button-group">
            <button type="submit" class="btn-primary">Generate QR Code</button>
            <button type="reset" class="btn-secondary">Clear</button>
          </div>
        </form>

        <div class="qr-preview" id="preview" style="display: none;">
          <img id="qrImage" alt="Generated QR Code">
          <div style="margin-top: 1rem; display: flex; gap: 0.5rem;">
            <button class="btn-success" onclick="downloadQR()">Download</button>
            <button class="btn-secondary" onclick="copyQRImage()">Copy</button>
          </div>
        </div>
      </div>

      <!-- History Card -->
      <div class="card">
        <h2><span class="icon">📋</span> QR Code History</h2>
        
        <div id="qrList" class="qr-list">
          <div class="empty-state">
            <p>No QR codes yet. Create one to get started!</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentQRId = null;
    let allQRCodes = [];

    const API_BASE = '/api';

    // DOM Elements
    const qrForm = document.getElementById('qrForm');
    const contentInput = document.getElementById('content');
    const labelInput = document.getElementById('label');
    const preview = document.getElementById('preview');
    const qrImage = document.getElementById('qrImage');
    const qrList = document.getElementById('qrList');
    const totalQRElement = document.getElementById('totalQR');
    const totalScansElement = document.getElementById('totalScans');

    // Form submission
    qrForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const content = contentInput.value.trim();
      const label = labelInput.value.trim();

      if (!content) {
        showToast('Please enter content', 'error');
        return;
      }

      const submitBtn = qrForm.querySelector('button[type="submit"]');
      const originalText = submitBtn.textContent;
      submitBtn.innerHTML = '<span class="loading"></span>';
      submitBtn.disabled = true;

      try {
        const response = await fetch(`${API_BASE}/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content, label })
        });

        if (!response.ok) throw new Error('Failed to generate QR code');

        const data = await response.json();
        
        currentQRId = data.qrId;
        qrImage.src = data.qrDataUrl;
        preview.style.display = 'block';
        
        showToast('QR code generated successfully!', 'success');
        loadQRCodes();
        
        // Scroll to preview
        preview.scrollIntoView({ behavior: 'smooth' });
      } catch (error) {
        showToast('Error generating QR code', 'error');
        console.error(error);
      } finally {
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
      }
    });

    // Load all QR codes
    async function loadQRCodes() {
      try {
        const response = await fetch(`${API_BASE}/qrcodes`);
        const data = await response.json();
        
        allQRCodes = data.qrcodes || [];
        renderQRList();
        updateStats();
      } catch (error) {
        console.error('Error loading QR codes:', error);
      }
    }

    // Render QR codes list
    function renderQRList() {
      if (allQRCodes.length === 0) {
        qrList.innerHTML = '<div class="empty-state"><p>No QR codes yet. Create one to get started!</p></div>';
        return;
      }

      qrList.innerHTML = allQRCodes.map((qr, index) => `
        <div class="qr-item" style="animation-delay: ${index * 0.05}s">
          <img src="${qr.qr_data || ''}" alt="${qr.label}">
          <div class="qr-info">
            <div class="qr-label">${escapeHtml(qr.label)}</div>
            <div class="qr-content" title="${escapeHtml(qr.content)}">${escapeHtml(qr.content)}</div>
            <div class="qr-meta">
              Created: ${new Date(qr.created_at).toLocaleDateString()} | 
              Scans: ${qr.access_count}
            </div>
          </div>
          <div class="qr-actions">
            <button class="btn-success" onclick="downloadQRById('${qr.qr_id}', '${escapeHtml(qr.label)}')">Download</button>
            <button class="btn-danger" onclick="deleteQR('${qr.qr_id}')">Delete</button>
          </div>
        </div>
      `).join('');
    }

    // Update statistics
    function updateStats() {
      totalQRElement.textContent = allQRCodes.length;
      const totalScans = allQRCodes.reduce((sum, qr) => sum + (qr.access_count || 0), 0);
      totalScansElement.textContent = totalScans;
    }

    // Download current QR code
    function downloadQR() {
      if (!currentQRId) {
        showToast('No QR code to download', 'error');
        return;
      }
      downloadQRById(currentQRId, labelInput.value || 'qrcode');
    }

    // Download QR by ID
    async function downloadQRById(qrId, label) {
      try {
        const response = await fetch(`${API_BASE}/download/${qrId}`);
        if (!response.ok) throw new Error('Download failed');

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${label.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.png`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        window.URL.revokeObjectURL(url);

        showToast('QR code downloaded!', 'success');
      } catch (error) {
        showToast('Error downloading QR code', 'error');
        console.error(error);
      }
    }

    // Copy QR image
    async function copyQRImage() {
      try {
        const canvas = document.createElement('canvas');
        const img = qrImage;
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        
        canvas.toBlob(blob => {
          navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
          showToast('QR code copied to clipboard!', 'success');
        });
      } catch (error) {
        showToast('Error copying QR code', 'error');
        console.error(error);
      }
    }

    // Delete QR code
    async function deleteQR(qrId) {
      if (!confirm('Are you sure you want to delete this QR code?')) return;

      try {
        const response = await fetch(`${API_BASE}/qrcodes/${qrId}`, {
          method: 'DELETE'
        });

        if (!response.ok) throw new Error('Delete failed');

        showToast('QR code deleted!', 'success');
        loadQRCodes();
      } catch (error) {
        showToast('Error deleting QR code', 'error');
        console.error(error);
      }
    }

    // Show toast notification
    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);

      setTimeout(() => {
        toast.remove();
      }, 3000);
    }

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Load QR codes on page load
    loadQRCodes();
    
    // Auto-refresh every 30 seconds
    setInterval(loadQRCodes, 30000);
  </script>
</body>
</html>
